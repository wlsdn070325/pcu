<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>버킷 리스트</title>
</head>

<body>

    <h1 align="center">나의 버킷 리스트</h1>

    <hr>

    <p>
        나는 게임 개발자가 되는 것을 목표로 하고 있으며,  
        다양한 경험을 통해 성장하고 싶다.
    </p>

    <hr>

    <h2>목표 리스트</h2>
    <ul>
        <li><input type="checkbox"> Unity로 게임 완성하기</li>
        <li><input type="checkbox"> AI NPC 시스템 만들기</li>
        <li><input type="checkbox"> 미국, 영국 등 해외여행 가기</li>
    </ul>

    <hr>

    <h2>계획표</h2>
    <table border="2" width="500">
        <tr>
            <th>목표</th>
            <th>기간</th>
            <th>상태</th>
        </tr>
        <tr>
            <td>Unity 공부</td>
            <td>2026</td>
            <td><font color="green">진행중</font></td>
        </tr>
        <tr>
            <td>게임 출시</td>
            <td>2027</td>
            <td><font color="red">미완료</font></td>
        </tr>
    </table>
</body>
</html>
