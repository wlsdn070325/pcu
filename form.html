<!DOCTYPE html>
<html>
<head>

</head>

<body>

    <form>
        이름: <input type="text" placeholder="이름을 입력하세요"><br>
        전화번호: <input type="text"><br>
        비밀번호: <input type="text"><br>
        자기소개: <textarea cols="30" rows="30"></textarea><br>
        출생지: <input type="text" list="city">
        <datalist id="city">
            <option value="대전">
            <option value="서울">
        </datalist><br>
        
        <button type="button"><img src="apple.png"></button><br>
        <input type="checkbox" value="1"> 짜장면
        <input type="checkbox" value="2"> 짬뽕
        <input type="checkbox" value="3" checked> 탕수육
        <br>
        <input type="radio" name="food" value="1"> 짜장면
        <input type="radio" name="food" value="1"> 짬뽕
        <input type="radio" name="food" value="1" checked> 탕수육
        <br>
        <select name="china">
            <option value="1"> 짜장면</option>
            <option value="2"> 짬뽕</option>
            <option value="3"> 탕수육</option>

        </select><br>

        <input type="color" value="#ff0000" onchange="document.body.style.backgroundColor=this.value"><br>
        <input type="time" value="15:30"><br>
        <input type="number" min="0" max="10" step="0.5"><br>
        <input type="range" list="temp">
        <datalist id="temp">
            <option value="10" label="Low">
                <option value="50" label="Midium">
            <option value="90" label="High">
        </datalist><br><br><br><br><br><br><br><br><br>

        <input type="submit" value="제출">
        
    </form>
</body>
</html>
